<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - ShoeMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        :root {
            --font-main: 'Outfit', sans-serif;
        }
        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .login-header p {
            color: #6c757d;
            font-size: 0.95rem;
            font-weight: 400;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #495057;
            margin-left: 4px;
        }
        .form-input {
            width: 100%;
            padding: 14px 20px;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            color: #212529;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--mocha);
            box-shadow: 0 0 0 4px rgba(165, 149, 111, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.3);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #adb5bd;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: var(--mocha);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Admin Portal</h1>
            <p>Welcome back, please login to continue.</p>
        </div>
        <form id="admin-login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="admin-username" class="form-input" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Sign In to Dashboard</button>
        </form>
        <a href="index.html" class="back-link">← Return to ShoeMart Store</a>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('admin-username').value;
            const pass = document.getElementById('admin-password').value;
            
            if (user === 'admin' && pass === 'admin123') {
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid credentials!');
            }
        });
    </script>
</body>
</html>
